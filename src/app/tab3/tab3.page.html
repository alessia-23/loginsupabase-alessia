<ion-header [translucent]="true">
  <ion-toolbar>
    <!-- Título de la página -->
    <ion-title>
      Busca a un Pokemón
    </ion-title>
    <!-- Botón para cerrar sesión -->
    <ion-button slot="end" fill="clear" color="danger" (click)="cerrarSesion()">
      <!-- Icono logout -->
      <ion-icon name="log-out-outline"></ion-icon>
    </ion-button>
  </ion-toolbar>
</ion-header>
